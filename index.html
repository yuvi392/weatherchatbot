<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      border: none;
      border-radius: 8px;
      background: #ff7b00;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff9500;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      white-space: pre-line;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }

    .loading {
      margin-top: 20px;
      font-size: 18px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🌦 Weather App</h1>
  <p>Get real-time weather & forecast</p>

  <input type="text" id="city" placeholder="Enter city...">
  <button onclick="getWeather()">Search</button>

  <div id="result"></div>
</div>

<script>
async function getWeather() {
  const city = document.getElementById("city").value.trim();
  const resultBox = document.getElementById("result");

  if (!city) {
    alert("Please enter a city!");
    return;
  }

  resultBox.innerHTML = "<div class='loading'>Fetching weather...</div>";

  try {
    const response = await fetch("https://weatherchatbot-1.onrender.com/weather", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ city: city })
    });

    if (!response.ok) {
      throw new Error("Server error");
    }

    const data = await response.json();

    resultBox.innerText = data.response;

  } catch (error) {
    console.error(error);
    resultBox.innerText = "⚠️ Error fetching data. Try again.";
  }
}
</script>

</body>
</html>
