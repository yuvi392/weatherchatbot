<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      padding: 50px;
      color: white;
    }

    .container {
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: orange;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      white-space: pre-line;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>🌦 Weather Forecast App</h1>

<div class="container">
  <input type="text" id="city" placeholder="Enter city (e.g., Delhi)">
  <button onclick="getWeather()">Get Weather</button>

  <div id="result"></div>
</div>

<script>
async function getWeather() {
  const city = document.getElementById("city").value.trim();
  const resultBox = document.getElementById("result");

  if (!city) {
    alert("Please enter a city!");
    return;
  }

  resultBox.innerText = "Loading...";

  try {
    const response = await fetch("https://weatherchatbot-1.onrender.com/weather", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ city: city })
    });

    // 🔥 check HTTP status
    if (!response.ok) {
      throw new Error("Server error: " + response.status);
    }

    const data = await response.json();

    // 🔥 check response structure
    if (data.response) {
      resultBox.innerText = data.response;
    } else {
      resultBox.innerText = "Unexpected response from server.";
    }

  } catch (error) {
    console.error(error);
    resultBox.innerText = "Error fetching data. Please try again.";
  }
}
</script>

</body>
</html>
